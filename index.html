    <html lang="en">
        <head>
            <link rel="stylesheet" href="HW1-CSS"><!-- Link to CSS file -->
            <!--displays text in the browser's tab-->
            <title>New Patient Registration | Reefs Medical Clinic</title>
        </head>
        <body>
            <header>
                <table width="100%">
            <tr>
                <td valign="top" align="left" width="30%">
                    <div class="image">
                        <img align="center" src="ReefsClinicLogo.png" alt="clinic logo" width="200px" id="logo"/>
                    </div>
                 </td>
                 <td>
                    <h2> Reefs Medical Clinic</h2>
                </td>
                <td valign="bottom" align="right" width="20%">
                    <p> Today's Date: <span id= "today"></span></p>
                </td>
            </tr>
             </table>
        </header>
<hr>
<!--The Form begins Here-->
<form action="thankyou.html">
    <center>
        <div class="format">
            <table>
                <tr>
                    <th colspan="4">Create Patient Portal Account</th>
                </tr>
                <!--patient information section of form starts here-->
               
                <tr>
                    <td class="td1"><label for="fname">First Name:</label></td>
                    <td>
                        <input
                            type="text"
                            name="fname"
                            id="fname"
                            maxlength="30"
                            required
                            title="Please enter your first name."
                            placeholder="Aamir"
    
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="mini">Middle Name:</label></td>
                    <td>
                        <input
                            type="text"
                            name="mini"
                            id="mini"
                            maxlength="1"
                            required
                            title="Please enter your middle initial."
                            placeholder="M"
    
                    </td>
                </tr>

               <tr>
                    <td class="td1"><label for="lname">Last Name:</label></td>
                    <td>
                        <input
                            type="text"
                            name="lname"
                            id="lname"
                            maxlength="30"
                            required
                            title="Please enter your last name."
                            placeholder="Rajab"
    
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="psex">Patient's Sex</label></td>
                    <td>
                        <input
                        type="radio"
                        id="s1"
                        name="psex"
                        value="Male"
                        /> Male
                        
                        <input
                        type="radio"
                        id="s2"
                        name="psex"
                        value="Female"
                        /> Female

                        <input
                        type="radio"
                        id="s3"
                        name="psex"
                        value="other"
                        /> Other
                    </td>
                </tr>
                
                <tr>
                    <td class="td1"><label for="dob">Date of birth:</label></td>
                    <td>
                        <input
                        type="'date"
                        id="dob"
                        name="dob"
                        placeholder="mm/dd/yyyy"
                        />
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="ssn">SSN:</label></td>
                    <td>
                        <input
                        type="password"
                        minlength="11"
                        maxlength="11"
                        name="ssn"
                        id="ssn"
                        required
                        title="Please enter your social security number"
                        placeholder="123-45-6789"
                        />
                    </td>
                </tr>

                <tr>
                    <th colspan="4"><hr></th><!--Line to create seperation-->
                </tr>

                <tr> 
                    <th colspan="4">Patient Contact Informaion</th>
                </tr>
                
                <tr>
                    <td class="td1"><label for="address 1">Address</label></td>
                    <td>
                        <input
                        type="text"
                        name="address1"
                        id="address1"
                        maxlength="40"
                        required
                        title="Please enter your address"
                        placeholder="4750 tree rd"
                        />
                    </td>
                </tr>

                <tr> 
                    <td class="td1"><label for="address2">Address Line 2:</label></td>
                    <td>
                        <input 
                        type="text"
                        name="address2"
                        id="address2"
                        maxlength="40"
                        required
                        title="Please enter your address line 2"
                        placeholder="Apt#"
                        />
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="city">City:</label></td>
                    <td>
                        <input
                        type="text"
                        name="city"
                        id="city"
                        maxlength="20"
                        required
                        title="Please enter your city"
                        placeholder="Houston"
                        />
                    </td>
                </tr>

                <tr>
                    <td class="td1"><label for="State">State</label></td>
                    <td>                   
                        <select name="state" id="state" required title="Please select your state">
                            <option value="">Select a State</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>       
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                            <option value="DC">District of Columbia</option>
                         </select>
                    </td>
                    </tr>
                <tr>
                    <td class="td1"><label for="zcode">Zip Code:</label></td>
                    <td>
                        <input
                        type="text"
                        name="zcode"
                        id="zcode"
                        pattern="[0-9]{5}"
                        maxlength="5"
                        required
                        title="Please enter your zip code"
                        placeholder="77001"
                        />
                    </td>
                </tr>
                    <tr>
                        <td class="td1"><label for="phone">Phone Number:</label></td>
                        <td>
                            <input
                            type="text"
                            name="phone"
                            id="phone"
                            pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                            maxlength="12"
                            required
                            title="Please enter your phone number in the format: 123-456-7890"
                            placeholder="123-456-7890"
                            />
                        </td>
                        </tr>

                          <td class="td1"><label for="email">Email Address:</label></td>
                    <td>
                        <input
                        type="email"
                        name="email"
                        id="email"
                        required
                        title="Please enter a valid email address"
                        placeholder="user@example.com"
                        />
                    </td>
                </tr>

                
                <tr>
                    <th colspan="4"><hr></th><!--Line to create seperation-->
                </tr>

                <!--Patient History Section here-->
                <tr>
                    <th colspan="4">Patient Medical History</th>
                </tr>

                <tr>
                    <td class="td1"><label for="pat_hist">Are you currently experiencing?:</label></td>
                    <td>
                        <input type="checkbox" id="option1" value="Acne">
                        <label for="option1">Acne</label><br>
                        
                        <input type="checkbox" id="option2" value="Headache">
                        <label for="option2">Headache</label><br>
                        
                        <input type="checkbox" id="option3" value="Fever">
                        <label for="option3">Fever</label><br>

                        <input type="checkbox" id="option4" value="Cough">
                        <label for="option4">Cough</label><br>

                        <input type="checkbox" id="option5" value="Other">
                        <label for="option5">Other</label><br>
                    </td>
                 </tr>

                 <tr>
                    <td class="td1" align="right">
                        <label for="notes"> If you selected any of the above, Please describe</label>
                    </td>

                    <td>
                        <textarea
                        rows="4"
                        cols="20"
                        maxlength="500"
                        id="notes"
                        name="notes"
                        title="Please enter a brief description of your symptoms"
                        placeholder="Insert text here"
                        ></textarea>
                        <span id="description_text"></span>
                    </td>
                </tr>
                                    <!--Range Slider-->
                  <tr>
                    <td class="td1"><label for="range">Urgency of appointment?:<br/>(Rate form 1-10)</label></td>
                    <td>
                        <input
                        type="range"
                        name="range"
                        id="range"
                        min="1"
                        max="10"
                        Value="o"
                        />
                        <span id="range-slider"></span>
                    </td>

                    </tr>

                    <tr>
                        <th colspan="4"><hr></th><!--Line to create seperation-->
                    </tr>

                    <!--account information section-->
                    <tr>
                        <th colspan="4"><label for="uname">Finish Patient Information</label></th>
                    </tr>

                    <tr>
                        <td class="td1"><label for="uname">Username:</label></td>
                         <td>
                           <input type="text"
                           name="uname"
                           id="uname"
                           max length="15"
                           required
                           title="Please Enter Your Username"
                           placeholder="Aamir11"
                           />
                         </td
                     </tr>

                     <tr>
                        <td class="td1"><label for="pword">Password:</label></td>
                         <td>
                           <input type="password"
                           name="pword"
                           id="pword"
                           minlength="10"
                           max length="30"
                           required
                           title="Please Enter a Password"
                           placeholder="Required"
                           />
                         </td>
                     </tr>

                     <tr>
                        <td class="td1"><label for="con_pword">Confirm Password:</label></td>
                         <td>
                           <input type="password"
                           name="con_pword"
                           id="con_pword"
                           minlength="10"
                           max length="30"
                           required
                           title="Please Confirm Your Password"
                           placeholder="Required"
                           />
                         </td>
                     </tr>

                     <tr>
                        <td class="td1" colspan="4">
                            <center>
                                <input type="submit" name="Submit" id="submit" style="font-family: 'optima', sans-serif;"/>
                                &nbsp;&nbsp;&nbsp;
                                <input type="reset" name="Reset" id="reset" style="font-family: 'optima', sans-serif;"/>

                            </center>
                        </td>
                     </tr>

                     </tr>

                    



</table>
        </div>
    </center>
</form>
<!--Footer goes here that contains the website link-->
<footer>
    <p id="footer">&#169 2026 Reefs Medical Clinic | <a href="insert.link.here" target="_blank">Contact Us</a></p>
</footer>

    </body>
</html>
